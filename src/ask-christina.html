<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ask_christina() — cmastral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Bebas+Neue&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --fg: #e8e0d0;
    --accent: #ff3c1f;
    --accent2: #00ffb3;
    --muted: #3a3a3a;
    --font-display: 'Bebas Neue', sans-serif;
    --font-mono: 'Fragment Mono', monospace;
    --font-body: 'Space Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.6;
    cursor: none;
    overflow-x: hidden;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NOISE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9000;
    opacity: 0.4;
  }

  /* SCANLINE */
  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: rgba(0, 255, 179, 0.05);
    z-index: 8999;
    pointer-events: none;
    animation: scanMove 8s linear infinite;
  }
  @keyframes scanMove {
    from { top: -2px; }
    to { top: 100vh; }
  }

  /* CURSOR */
  #cursor {
    position: fixed;
    width: 10px; height: 10px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: difference;
  }
  #cursor-ring {
    position: fixed;
    width: 36px; height: 36px;
    border: 1px solid var(--fg);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    opacity: 0.5;
  }
  body:has(a:hover) #cursor,
  body:has(button:hover) #cursor { width: 18px; height: 18px; background: var(--accent2); }
  body:has(a:hover) #cursor-ring,
  body:has(button:hover) #cursor-ring { width: 56px; height: 56px; border-color: var(--accent2); }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    mix-blend-mode: difference;
  }
  .nav-logo {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--fg);
    text-decoration: none;
    text-transform: uppercase;
  }
  .nav-back {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--fg);
    text-decoration: none;
    text-transform: uppercase;
    opacity: 0.5;
    transition: opacity 0.3s;
  }
  .nav-back:hover { opacity: 1; }

  /* MAIN */
  main {
    max-width: 860px;
    margin: 0 auto;
    padding: 140px 40px 80px;
    flex: 1;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  .page-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .page-label::before {
    content: '';
    width: 30px; height: 1px;
    background: var(--accent);
  }

  .page-title {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 100px);
    line-height: 0.9;
    color: var(--fg);
    margin-bottom: 20px;
  }

  .page-desc {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.9;
    color: var(--fg);
    opacity: 0.45;
    max-width: 480px;
    margin-bottom: 48px;
  }

  /* CHAT PANEL */
  .panel {
    border: 1px solid var(--muted);
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 460px;
    max-height: 600px;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 12px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--muted) transparent;
  }

  .row {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 80%;
  }
  .row.user { align-self: flex-end; align-items: flex-end; }
  .row.assistant { align-self: flex-start; align-items: flex-start; }

  .row.assistant::before {
    content: 'ask_christina()';
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--accent2);
    text-transform: uppercase;
  }
  .row.user::before {
    content: 'you';
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .bubble {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.85;
    padding: 14px 18px;
  }
  .row.assistant .bubble {
    background: #111;
    border: 1px solid var(--muted);
    color: var(--fg);
    border-left: 2px solid var(--accent2);
  }
  .row.user .bubble {
    background: var(--accent);
    color: var(--bg);
  }

  /* THINKING */
  #thinking {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--accent2);
    letter-spacing: 0.1em;
    padding: 0 28px 8px;
    min-height: 24px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* FORM */
  #form {
    display: flex;
    border-top: 1px solid var(--muted);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--fg);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 18px 20px;
    outline: none;
    letter-spacing: 0.04em;
  }
  #input::placeholder { color: var(--muted); }

  #form button {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 18px 24px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    cursor: none;
    border-left: 1px solid var(--muted);
    transition: background 0.2s;
  }
  #form button:hover { background: var(--fg); }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--muted);
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  @media (max-width: 768px) {
    nav, main, footer { padding-left: 20px; padding-right: 20px; }
    .row { max-width: 95%; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<div class="scanline"></div>

<nav>
  <a href="/" class="nav-logo">cmastral_</a>
  <a href="/" class="nav-back">← back</a>
</nav>

<main>
  <div class="page-label">Playground / 00</div>
  <h1 class="page-title">ask_christina()</h1>
  <p class="page-desc">a small agent that only knows my CV, research, and projects. ask about my background, skills, or what i've been working on. sometimes it will tell you to email me.</p>

  <div class="panel">
    <div id="chat"></div>
    <div id="thinking"></div>
    <form id="form">
      <input id="input" placeholder="ask about my background, skills, projects…" autocomplete="off" />
      <button type="submit">send</button>
    </form>
  </div>
</main>

<footer>
  <span>© <span id="footer-year"></span> Christina Mastralexi</span>
  <span>ask_christina()</span>
  <span>cmastral.github.io</span>
</footer>

<script>
// CURSOR
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});
function animateRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

document.getElementById('footer-year').textContent = new Date().getFullYear();

// ---- ASK CHRISTINA LOGIC (unchanged) ----
const API = "https://cv-agent-worker.cmastral.workers.dev/api/agent/ask";

const chatEl     = document.getElementById("chat");
const formEl     = document.getElementById("form");
const inputEl    = document.getElementById("input");
const thinkingEl = document.getElementById("thinking");

let history = [];

function addMessage(role, content) {
  const row = document.createElement("div");
  row.className = "row " + role;
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content;
  row.appendChild(bubble);
  chatEl.appendChild(row);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function setThinking(on) {
  thinkingEl.textContent = on ? "> let me think…" : "";
}

formEl.addEventListener("submit", async (e) => {
  e.preventDefault();
  const q = inputEl.value.trim();
  if (!q) return;

  addMessage("user", q);
  history.push({ role: "user", content: q });
  inputEl.value = "";
  setThinking(true);

  try {
    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, history })
    });
    const data = await res.json();
    setThinking(false);

    if (!res.ok || !data.answer) {
      console.error("error:", data);
      addMessage("assistant", "something glitched on my side. maybe try again – or email christina at xristinamst@gmail.com.");
      return;
    }

    history.push({ role: "assistant", content: data.answer });
    addMessage("assistant", data.answer);
  } catch (err) {
    console.error(err);
    setThinking(false);
    addMessage("assistant", "network error – are we offline? you can always email christina at xristinamst@gmail.com.");
  }
});

addMessage("assistant", "hi, i'm a small agent that knows christina's CV, research, and projects. ask me about her background, skills, or where her work is heading.");
</script>
</body>
</html>
